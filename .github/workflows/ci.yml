name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet -tags fts5 ./...

      - run: CGO_ENABLED=1 go test -tags fts5 -race ./...
        env:
          CAPY_DB_KEY: ci-test-key-at-least-32-characters-long!!
